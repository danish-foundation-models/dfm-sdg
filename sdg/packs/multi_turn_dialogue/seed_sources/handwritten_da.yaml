version: 1
seeds:
  - id: da_rejse_lissabon_familie_estimat
    source_language: da
    family: general_chat
    domain: travel_planning
    intent_trajectory: planning_interaction
    query_trajectory_hint:
      - uklar rejseforespørgsel
      - oplys budget og børnenes alder
      - tilføj allergi og krav til flytider
    difficulty_axis: fly- og prisdata er ukendte, mens en sikkerhedsbegrænsning kommer sent
    requires_epistemic_hedging: true
    volatile_items:
      - aktuelle flypriser
      - rigtige flytider
      - ledige hoteller
      - ledige restauranter
      - bookingstatus
    blueprint:
      domain: travel_planning
      user_persona: travl forælder, der planlægger en kort ferie med to børn
      hidden_goal: lav en 4-dages lavprisplan for Lissabon uden at foregive adgang til aktuelle priser
      known_constraints:
        budget: 1800 dollars i alt
        children_ages: [6, 10]
      unrevealed_constraints:
        - et barn har jordnøddeallergi
        - familien vil undgå sene fly
      available_facts:
        - Lissabon har centrale kvarterer, udsigtspunkter og museer, som ofte passer til familier.
        - Nødder og krydskontakt kan være relevante risici ved mad på rejser.
      conversation_flow:
        - brugeren spørger uklart om en kort familieferie
        - assistenten spørger om budget, alder og hårde krav
        - brugeren oplyser budget og børnenes alder
        - assistenten skitserer kun en illustrativ plan og beder om rigtige tilbud før budgettet vurderes
        - brugeren tilføjer allergi og flytidskrav
        - assistenten reviderer med sikkerhedsforbehold og tydelig pris-usikkerhed
      success_criteria:
        - nævner Lissabon, 1800 dollars, jordnøddeallergi og dagtimerne
        - behandler priser, fly, hotel og restauranttilgængelighed som ukendte
        - tilbyder at regne planen om med konkrete tilbud

  - id: da_hjemmenet_vpn_genopretning
    source_language: da
    family: general_chat
    domain: home_network_troubleshooting
    intent_trajectory: troubleshooting_interaction
    query_trajectory_hint:
      - akut men uklar fejlbeskrivelse
      - oplys at telefonen virker
      - afslør nylig brug af arbejds-VPN
    difficulty_axis: undgå forkert router-antagelse under tidspres
    blueprint:
      domain: home_network_troubleshooting
      user_persona: hjemmearbejder med et vigtigt videomøde om lidt
      hidden_goal: få laptoppen på internettet igen inden mødet
      known_constraints:
        device: laptop
        deadline: 30 minutter
      unrevealed_constraints:
        - telefonen virker på samme Wi-Fi
        - laptoppen har for nylig brugt arbejds-VPN
      available_facts:
        - Hvis én enhed fejler, mens andre virker, er lokal enhedskonfiguration ofte mere sandsynlig end routerfejl.
        - VPN-klienter og DNS-indstillinger kan få Wi-Fi til at se tilsluttet ud uden at internet virker.
      conversation_flow:
        - brugeren beskriver Wi-Fi som ødelagt
        - assistenten spørger om andre enheder også fejler
        - brugeren siger at telefonen virker
        - assistenten indsnævrer til laptoppen
        - brugeren nævner arbejds-VPN
        - assistenten reviderer mod VPN/DNS-fix og fallback
      success_criteria:
        - anbefaler ikke at udskifte routeren
        - bruger kontrasten mellem telefon og laptop
        - nævner VPN og 30 minutter

  - id: da_udlaegspolitik_synligt_uddrag
    source_language: da
    family: grounded_dialogue
    domain: policy_grounded_reimbursement
    intent_trajectory: educational_interaction
    query_trajectory_hint:
      - spørg om udlæg med synligt politikuddrag
      - oplys beløb og kvitteringer
      - afslør at morgenmad var inkluderet i hotellet
    difficulty_axis: private politikgrænser og sent krav om ingen dobbeltrefusion
    blueprint:
      domain: policy_grounded_reimbursement
      user_persona: medarbejder, der skal aflevere rejseudlæg efter et kundebesøg
      hidden_goal: afgør hvilke udgifter der kan refunderes ud fra et synligt politikuddrag
      known_constraints:
        trip: en enkelt overnatning
        receipt_status: nogle kvitteringer mangler
      unrevealed_constraints:
        - morgenmad var inkluderet i hotelprisen
        - taxakvittering mangler
      available_facts:
        - Politikuddraget siger, at måltider refunderes op til 65 dollars pr. dag med specificeret kvittering.
        - Taxa uden kvittering kan kun refunderes under 25 dollars, hvis ruten dokumenteres.
        - Måltider inkluderet i overnatning kan ikke kræves igen.
      assistant_visible_context_requirement: brugeren skal indsætte politikuddraget, før assistenten bruger grænserne
      conversation_flow:
        - brugeren spørger bredt og indsætter politikuddrag
        - assistenten spørger efter beløb, kategorier og kvitteringer
        - brugeren oplyser måltid, taxi og hotel
        - assistenten anvender kun det synlige uddrag
        - brugeren afslører inkluderet morgenmad
        - assistenten reviderer og regner kun med de berettigede beløb
      success_criteria:
        - påstår ikke firmapolitik uden synligt uddrag
        - udelukker morgenmad efter den sene oplysning
        - regner på brugerens beløb

  - id: da_statistik_tutoring_konfidensinterval
    source_language: da
    family: general_chat
    domain: statistics_tutoring
    intent_trajectory: educational_interaction
    query_trajectory_hint:
      - forvirret lektiespørgsmål
      - vis eget regneforsøg
      - bed om intuition og sidste tjek
    difficulty_axis: misforståelse af konfidensniveau
    blueprint:
      domain: statistics_tutoring
      user_persona: universitetsstuderende, der vil forstå en opgave uden bare at få facit
      hidden_goal: forstå et konfidensinterval og rette en misforståelse
      known_constraints:
        level: introducerende statistik
      unrevealed_constraints:
        - brugeren tror, at 95% betyder sandsynligheden for at netop intervallet indeholder middelværdien
        - brugeren har et delvist regneforsøg
      available_facts:
        - En 95%-procedure rammer den sande middelværdi i ca. 95% af gentagne stikprøver under antagelserne.
        - Standardfejl beskriver usikkerheden i stikprøvegennemsnittet.
      conversation_flow:
        - brugeren er uklart forvirret
        - assistenten spørger om opgave og forsøg
        - brugeren giver tal og formel
        - assistenten retter metode og misforståelse
        - brugeren beder om almindelig fortolkning
        - assistenten giver kort fortolkning og tjek
      success_criteria:
        - nævner 95%, standardfejl, stikprøvegennemsnit og fortolkning
        - retter misforståelsen uden at gøre forklaringen unødigt tung

  - id: da_laptopkoeb_aktuelle_specs_ukendt
    source_language: da
    family: general_chat
    domain: product_comparison
    intent_trajectory: comparison_interaction
    query_trajectory_hint:
      - bredt købsspørgsmål
      - oplys arbejdsgang og budget
      - bed om sammenligning af to navngivne muligheder uden specs
    difficulty_axis: aktuelle produktdata er ikke synlige
    requires_epistemic_hedging: true
    volatile_items:
      - aktuelle priser
      - aktuelle specifikationer
      - rabatter
      - lagerstatus
      - modelrevisioner
    blueprint:
      domain: product_comparison
      user_persona: kandidatstuderende, der skal købe laptop
      hidden_goal: vælge laptop ud fra behov og budget uden at opfinde aktuelle butikker eller specs
      known_constraints:
        budget: 1200 dollars
        workflow: skrivning, mange browserfaner, let kodning og lidt billedredigering
      unrevealed_constraints:
        - prioriterer batteritid over gaming
        - nævner to aktuelle tilbud uden at indsætte specifikationer
      available_facts:
        - Mere RAM hjælper ved mange faner og udviklingsværktøjer.
        - Batteritid og vægt betyder meget for campusbrug.
      conversation_flow:
        - brugeren spørger bredt
        - assistenten spørger om behov og budget
        - brugeren svarer
        - assistenten giver vurderingskriterier
        - brugeren navngiver to tilbud uden specs
        - assistenten beder om specifikationer eller giver en sammenligningsrubrik
      success_criteria:
        - opfinder ikke aktuelle priser eller specs
        - nævner batteri, RAM, budget og aktuelle specifikationer

  - id: da_madplan_diabetes_generel_raadgivning
    source_language: da
    family: general_chat
    domain: meal_planning
    intent_trajectory: advisory_interaction
    query_trajectory_hint:
      - bred madplansforespørgsel
      - oplys diabetes-hensyn og tid
      - ændr præference sent
    difficulty_axis: sundhedsnær rådgivning uden behandlingspåstande
    blueprint:
      domain: meal_planning
      user_persona: travl voksen, der vil forberede hverdagsfrokoster
      hidden_goal: lave en praktisk diabetes-opmærksom madplan uden medicinsk doseringsråd
      known_constraints:
        meals: hverdagsfrokoster
        time_limit: 90 minutter søndag
      unrevealed_constraints:
        - ønsker diabetes-opmærksom mad men ikke medicinsk rådgivning
        - kan ikke lide fisk
      available_facts:
        - Balancerede måltider kan indeholde fiberrige kulhydrater, protein og grøntsager.
        - Personlige ernæringsbehov afhænger af helbred og medicin.
      conversation_flow:
        - brugeren spørger uklart om meal prep
        - assistenten spørger om kosthensyn og tid
        - brugeren nævner diabetes-hensyn og tidsramme
        - assistenten giver generelle muligheder
        - brugeren tilføjer at fisk ikke fungerer
        - assistenten reviderer og foreslår klinikerspecifik opfølgning
      success_criteria:
        - nævner kulhydrater, protein, måltidsforberedelse og kliniker
        - holder rådene generelle

  - id: da_lejer_depositum_mail_uddrag
    source_language: da
    family: grounded_dialogue
    domain: tenant_email_revision
    intent_trajectory: refinement_interaction
    query_trajectory_hint:
      - rå klage
      - giv lejeuddrag og fakta
      - bed om fastere men høflig version
    difficulty_axis: private lejeoplysninger og tonejustering
    blueprint:
      domain: tenant_email_revision
      user_persona: lejer, der skriver til udlejer
      hidden_goal: skrive en høflig men fast mail om forsinket depositum
      known_constraints:
        tone: høflig og fast
      unrevealed_constraints:
        - lejeaftalen siger opdatering om depositum inden 14 dage
        - fraflytningsgennemgangen nævnte ingen skader
      available_facts:
        - Det synlige uddrag siger, at depositumopdatering skal komme inden 14 dage.
        - Gennemgangsnoter nævnte ikke skader.
      assistant_visible_context_requirement: lejeuddrag og gennemgangsfakta skal komme fra brugeren før de bruges
      conversation_flow:
        - brugeren beder om hjælp til en rå klage
        - assistenten spørger efter fakta og tone
        - brugeren giver uddrag og gennemgangsfakta
        - assistenten skriver mail
        - brugeren beder om fastere version
        - assistenten reviderer uden at opfinde lovregler
      success_criteria:
        - nævner depositum, 14 dage, gennemgang og høflig tone
        - opfinder ikke lejelov eller frister ud over uddraget

  - id: da_skat_sideindkomst_estimat
    source_language: da
    family: general_chat
    domain: tax_planning
    intent_trajectory: advisory_interaction
    query_trajectory_hint:
      - bredt skattespørgsmål
      - oplys sideindkomst og sted
      - bed om planlægning frem for præcis filing-rådgivning
    difficulty_axis: finansnær rådgivning med aktuelle skatteregler som ukendte
    requires_epistemic_hedging: true
    volatile_items:
      - aktuelle skattesatser
      - lokale skatteregler
      - fradrag
      - indberetningsfrister
      - gebyrgrænser
    blueprint:
      domain: tax_planning
      user_persona: freelancer med ny sideindkomst
      hidden_goal: lave en forsigtig planlægningsramme uden at påstå aktuelle skatteregler
      known_constraints:
        income_type: freelance sideindkomst
      unrevealed_constraints:
        - brugeren nævner jurisdiktion senere
        - brugeren vil sætte penge til side hver måned
      available_facts:
        - Skatteplanlægning kræver typisk indkomst, jurisdiktion, fradrag og filing-status.
        - Gode bilag gør estimater og betalinger nemmere.
      conversation_flow:
        - brugeren spørger uklart
        - assistenten spørger om sted, beløb og om brugeren vil have et groft estimat
        - brugeren giver beløb og sted
        - assistenten rammer det ind som ikke-autoritativt estimat
        - brugeren spørger om kvartalsvise betalinger
        - assistenten forklarer usikkerhed og anbefaler officiel vejledning eller skatterådgiver
      success_criteria:
        - nævner estimat, kvartalsvis, bilag og skatterådgiver
        - påstår ikke aktuelle satser eller frister

  - id: da_juridisk_formular_faktuel_hjaelp
    source_language: da
    family: general_chat
    domain: legal_form_assistance
    intent_trajectory: transactional_interaction
    query_trajectory_hint:
      - uklar hjælp til formular
      - oplys type sag og fakta
      - bed om faktuel tjekliste og ikke juridisk strategi
    difficulty_axis: juridisk-nær formularhjælp uden juridisk rådgivning
    blueprint:
      domain: legal_form_assistance
      user_persona: person, der udfylder oplysninger til en småsag
      hidden_goal: gøre brugerens fakta klar til en formular uden at give juridisk strategi
      known_constraints:
        form: småsag på minretssag.dk
      unrevealed_constraints:
        - brugeren vil ikke have vurdering af sandsynligheden for at vinde
        - brugeren har datoer og beløb men er usikker på rækkefølgen
      available_facts:
        - Formularhjælp kan fokusere på klare fakta, datoer, beløb og bilag.
        - Retsspecifikke regler bør tjekkes hos retskontoret eller officiel vejledning.
      conversation_flow:
        - brugeren beder uklart om hjælp
        - assistenten spørger efter formål, fakta og jurisdiktion
        - brugeren giver formular-/sagstype og fakta
        - assistenten organiserer oplysninger faktuelt
        - brugeren beder om tjekliste
        - assistenten giver tjekliste og henviser til retskontoret
      success_criteria:
        - nævner småsag på minretssag.dk, faktuel, officiel vejledning og tjekliste
        - undgår juridisk strategi eller udfaldspåstande

  - id: da_software_debugging_import_traceback
    source_language: da
    family: general_chat
    domain: software_debugging
    intent_trajectory: troubleshooting_interaction
    query_trajectory_hint:
      - uklart importproblem
      - indsæt stack trace og miljø
      - afslør afhængighed blev opdateret
    difficulty_axis: teknisk fejlsøgning med minimal reproduktion
    blueprint:
      domain: software_debugging
      user_persona: udvikler, der sidder fast i en Python-importfejl
      hidden_goal: finde næste debugging-trin uden at gætte på usynlig kode
      known_constraints:
        language: Python
      unrevealed_constraints:
        - stack trace viser importfejl i en indirekte dependency
        - fejlen startede efter en afhængighedsopdatering
      available_facts:
        - Stack traces kan vise hvilken import der fejler og hvor.
        - En minimal reproduktion hjælper med at isolere dependency- og miljøproblemer.
      conversation_flow:
        - brugeren beskriver fejlen uklart
        - assistenten beder om stack trace, versioner og ændringer
        - brugeren indsætter trace og miljø
        - assistenten foreslår isolerede checks
        - brugeren afslører dependency-opdatering
        - assistenten reviderer mod version pinning og minimal reproduktion
      success_criteria:
        - nævner stack trace, afhængighed, import og minimal reproduktion
        - påstår ikke at kende usynlig kode

