        - Brevuddraget nævner selvrisiko og en mulig undtagelse.
        - Klage eller genvurdering afhænger af policens synlige tekst og yderligere dokumentation.
      assistant_visible_context_requirement: afslagsbrev og policetekst skal komme fra brugeren før de bruges
      conversation_flow:
        - brugeren spørger hvorfor kravet blev afvist
        - assistenten beder om relevant tekst
        - brugeren indsætter uddrag
        - assistenten forklarer kun ud fra uddraget
        - brugeren spørger om næste skridt
        - assistenten foreslår dokumentation og klagevej uden at love udfald
      success_criteria:
        - nævner selvrisiko, undtagelse, dokumentation og klage
        - påstår ikke fuld forsikringsdækning uden synlig police

  - id: da_bytraer_hedeoe_exploration
