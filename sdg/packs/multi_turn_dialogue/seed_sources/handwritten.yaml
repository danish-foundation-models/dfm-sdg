      known_constraints:
        tone: polite and firm
      unrevealed_constraints:
        - lease excerpt says deposit update should arrive within 14 days
        - move-out walkthrough had no noted damage
      available_facts:
        - Lease excerpt says deposit update is due within 14 days of move-out.
        - Walkthrough notes did not list damage.
      assistant_visible_context_requirement: lease and walkthrough facts must be provided by the user before use
      conversation_flow:
        - user asks for help with a rough complaint
        - assistant asks for facts and tone
        - user provides lease excerpt and walkthrough fact
        - assistant drafts email
        - user asks for firmer version
        - assistant revises while staying polite
      success_criteria:
        - mentions deposit, 14 days, walkthrough, and polite
        - avoids inventing tenant law or legal deadlines beyond the excerpt

