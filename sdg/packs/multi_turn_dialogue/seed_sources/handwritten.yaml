version: 1
seeds:
  - id: travel_lisbon_family_estimate
    family: general_chat
    domain: travel_planning
    intent_trajectory: planning_interaction
    query_trajectory_hint:
      - vague trip request
      - reveal budget and children ages
      - add allergy and flight-time constraints
    difficulty_axis: volatile budget estimate plus late safety constraint
    requires_epistemic_hedging: true
    volatile_items:
      - current flight prices
      - real flight schedules
      - hotel inventory
      - restaurant availability
      - booking status
    blueprint:
      domain: travel_planning
      user_persona: busy parent planning a short trip with two children
      hidden_goal: plan a 4-day low-cost Lisbon itinerary without pretending to know live prices
      known_constraints:
        budget: "$1800 total"
        children_ages: [6, 10]
      unrevealed_constraints:
        - one child has a peanut allergy
        - avoid late-night flights
      available_facts:
        - Lisbon has walkable central neighborhoods and family-friendly museums.
        - Traditional desserts and sauces may carry nut or cross-contact risk.
      conversation_flow:
        - vague initial request
        - assistant asks clarifying question
        - user reveals budget and children ages
        - assistant offers an illustrative plan and asks for real quotes before confirming feasibility
        - user adds allergy and flight-time constraints
        - assistant revises with allergy precautions and live-data humility
      success_criteria:
        - mentions Lisbon, $1800, peanut, and daytime
        - treats prices, flights, lodging, and restaurant availability as unknown without live data
        - offers to recompute once real quotes are supplied

  - id: home_network_vpn_recovery
    family: general_chat
    domain: home_network_troubleshooting
    intent_trajectory: troubleshooting_interaction
    query_trajectory_hint:
      - urgent vague symptom
      - reveal device isolation
      - reveal recent VPN clue
    difficulty_axis: wrong-assumption recovery under time pressure
    blueprint:
      domain: home_network_troubleshooting
      user_persona: remote worker with a time-sensitive video call
      hidden_goal: restore laptop internet access before a call
      known_constraints:
        device: laptop
        deadline: 30 minutes
      unrevealed_constraints:
        - phone Wi-Fi works
        - laptop recently used a VPN
      available_facts:
        - If one device fails while others work, device configuration is more likely than router failure.
        - VPN clients and DNS settings can make Wi-Fi appear connected but unusable.
      conversation_flow:
        - vague Wi-Fi failure
        - assistant asks whether all devices are affected
        - user says phone works
        - assistant narrows to laptop checks
        - user reveals VPN clue
        - assistant revises toward VPN and DNS recovery
      success_criteria:
        - does not recommend replacing the router
        - uses phone-versus-laptop contrast
        - mentions VPN and 30 minutes

  - id: policy_reimbursement_visible_excerpt
    family: grounded_dialogue
    domain: policy_grounded_reimbursement
    intent_trajectory: educational_interaction
    query_trajectory_hint:
      - ask reimbursement question with visible policy excerpt
      - disclose expense details and receipts
      - reveal breakfast was included in lodging
    difficulty_axis: private policy facts plus late no-double-claim constraint
    blueprint:
      domain: policy_grounded_reimbursement
      user_persona: employee submitting an expense report after a short trip
      hidden_goal: determine which travel expenses can be reimbursed from a visible policy excerpt
      known_constraints:
        trip: one-night client visit
        receipt_status: some receipts missing
      unrevealed_constraints:
        - hotel breakfast was included
        - taxi receipt is missing
      available_facts:
        - Meals are reimbursable up to $65 per day when itemized receipts are attached.
        - A taxi can be reimbursed without a receipt only when the amount is under $25 and the route is documented.
        - Meals included in lodging cannot be claimed again as a separate meal expense.
      assistant_visible_context_requirement: user must paste the relevant policy excerpt before the assistant uses policy thresholds
      conversation_flow:
        - user asks vague reimbursement question and pastes policy excerpt
        - assistant asks for amounts, categories, and receipts
        - user reveals meal, taxi, and lodging details
        - assistant applies only the visible policy
        - user reveals breakfast was included
        - assistant revises and runs the arithmetic
      success_criteria:
        - does not claim company policy unless it was visible first
        - excludes breakfast after late disclosure
        - computes eligible claim from user-provided amounts

  - id: proposal_revision_funder_update
    family: grounded_dialogue
    domain: proposal_revision
    intent_trajectory: refinement_interaction
    query_trajectory_hint:
      - rough edit request
      - disclose funder audience and source facts
      - add no-overclaim and ordering constraint
    difficulty_axis: grounded revision without overclaiming
    blueprint:
      domain: proposal_revision
      user_persona: nonprofit program lead preparing a short grant update
      hidden_goal: turn a rough update into a factual funder-ready paragraph
      known_constraints:
        tone: plain and credible
        length: short paragraph
      unrevealed_constraints:
        - avoid promising outcomes not yet measured
        - mention rural clinics before staff count
      available_facts:
        - Three rural clinics started using the intake checklist.
        - The pilot trained 18 clinic staff.
        - Outcome data will be reviewed next quarter.
      assistant_visible_context_requirement: source facts must be stated by the user before the assistant uses them
      conversation_flow:
        - rough editing request
        - assistant asks audience and proof level
        - user reveals funder audience and source facts
        - assistant drafts a paragraph
        - user adds ordering and caution constraints
        - assistant revises with grounded claims only
      success_criteria:
        - mentions three rural clinics before 18 clinic staff
        - says outcome data is pending next quarter
        - avoids claiming measured impact

  - id: tutoring_confidence_interval
    family: general_chat
    domain: statistics_tutoring
    intent_trajectory: educational_interaction
    query_trajectory_hint:
      - confused homework question
      - reveal attempted calculation
      - ask for intuition and final check
    difficulty_axis: misconception correction
    blueprint:
      domain: statistics_tutoring
      user_persona: college student preparing homework
      hidden_goal: understand a confidence interval without copying an answer blindly
      known_constraints:
        level: introductory statistics
      unrevealed_constraints:
        - user confuses confidence level with probability the fixed interval contains the mean
        - user has an attempted calculation
      available_facts:
        - A 95% confidence interval procedure captures the true mean in 95% of repeated samples under assumptions.
        - Standard error reflects sampling variability of the sample mean.
      conversation_flow:
        - vague confusion
        - assistant asks for problem statement and attempt
        - user gives sample mean and attempted formula
        - assistant corrects method and misconception
        - user asks for plain-English interpretation
        - assistant gives concise interpretation and check
      success_criteria:
        - mentions 95%, standard error, sample mean, and interpretation
        - corrects the misconception without overcomplicating

  - id: laptop_purchase_current_specs_unknown
    family: general_chat
    domain: product_comparison
    intent_trajectory: comparison_interaction
    query_trajectory_hint:
      - broad purchase question
      - reveal workflow and budget
      - ask to compare two named options without live specs
    difficulty_axis: current product data boundary
    requires_epistemic_hedging: true
    volatile_items:
      - current prices
      - current specs
      - discounts
      - stock availability
      - model revisions
    blueprint:
      domain: product_comparison
      user_persona: graduate student buying a laptop
      hidden_goal: choose a laptop based on workflow and budget without pretending to know current listings
      known_constraints:
        budget: "$1200"
        workflow: writing, browser tabs, light coding, occasional photo editing
      unrevealed_constraints:
        - prioritizes battery life over gaming
        - asks about two current retail listings not shown in the conversation
      available_facts:
        - More RAM helps with many browser tabs and development tools.
        - Battery life and weight matter for campus use.
      conversation_flow:
        - broad purchase question
        - assistant asks workflow and budget
        - user gives workflow and budget
        - assistant explains evaluation criteria
        - user names two options without specs
        - assistant asks for current specs or gives a comparison rubric
      success_criteria:
        - does not invent current prices or model specs
        - mentions battery, RAM, budget, and current specs

