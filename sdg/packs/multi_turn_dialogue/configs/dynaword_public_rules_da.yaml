pack: multi_turn_dialogue
seed: 17
reuse_completed: true
models:
  source_task_planner:
    endpoint: openai
    timeout_seconds: 900
  blueprint_writer:
    endpoint: openai
    timeout_seconds: 900
  intent_modeler:
    endpoint: openai
    timeout_seconds: 900
  skeleton_writer:
    endpoint: openai
    timeout_seconds: 900
  user_simulator:
    endpoint: openai
    timeout_seconds: 900
  assistant_teacher:
    endpoint: openai
    timeout_seconds: 900
  reviewer:
    endpoint: openai
    timeout_seconds: 900
  preference_writer:
    endpoint: openai
    timeout_seconds: 900
generation:
  count: 8
  candidate_multiplier: 2
  train_fraction: 0.75
  languages: [da]
  latent_language: en
  seed_expansion:
    variants_per_seed: 4
  seed_sources:
    - type: source_pack
      id: dynaword_retsinformation_da
      family: grounded_dialogue
      source_language: da
      source_methods: &source_methods
        - APIGen-MT
        - ConsistentChat
        - Action-Based Contrastive Self-Training
        - MDS
      intent_trajectory: Information Retrieval Interaction
      subtask_trajectory: source_grounded_synthesis
      difficulty_axis: Danish public-source excerpt with missing user facts and current-status uncertainty
      volatile_items: &public_source_volatile_items
        - current source status
        - unseen surrounding rules
        - user-specific eligibility facts
      source_payload_strategies: &source_payload_strategies
        - full_excerpt
        - long_contiguous_excerpt
        - selected_clauses
        - summary_plus_quotes
        - staged_excerpts
      source_payload_lengths: &source_payload_lengths
        - long
        - medium
        - long
        - short
      source_payload_styles: &source_payload_styles
        - fenced_text
        - blockquote
        - plain_delimited
        - separator
      source_payload_label_styles: &source_payload_label_styles
        - excerpt
        - pasted_text
        - document_passage
        - relevant_text
        - copied_text
        - quoted_passage
      license: varies by Dynaword source
      url: https://huggingface.co/datasets/danish-foundation-models/danish-dynaword
      documents:
        dataset: danish-foundation-models/danish-dynaword
        config_name: retsinformationdk
        split: train
        streaming: true
        text_field: text
        id_field: id
        source_field: source
        created_field: created
        min_chars: 500
        max_chars: 12000
        max_records: 512
      personas: &nemotron_surface_personas
        dataset: nvidia/Nemotron-Personas-USA
        split: train
        streaming: true
        id_field: uuid
        projection:
          enabled: true
          target_locale: da-DK
          occupation_field: occupation
          education_field: education_level
          age_field: age
          include_skill_tags: true
          skill_tags_field: skills_and_expertise_list
          max_skill_tags: 3
        min_age: 18
        max_records: 64
        license: cc-by-4.0
    - type: source_pack
      id: dynaword_skat_da
      family: grounded_dialogue
      source_language: da
      source_methods: *source_methods
      intent_trajectory: Information Retrieval Interaction
