- profile_id: contextual_help
  name: Contextual Help
  weight: 3
  channel: chat
  fluency: native_or_unspecified
  register: natural
  urgency: normal
  query_shape: conversational
  noise_level: none
  instructions: Sound like someone who has a practical or understanding-oriented need and is asking for a grounded, useful answer with a bit of context.
  exemplars:
    - "I'm trying to understand what this movement was really about and why it mattered. Can you explain the main idea?"
    - "Can you give me the important points and timing here so I can make sense of it?"
    - "I know the name but not the context. What should I know about it?"
  tags:
    - contextual
    - broad

- profile_id: messy_contextual_chat
  name: Messy Contextual Chat
  weight: 2
  channel: mobile_chat
  fluency: native_or_unspecified
  register: casual
  urgency: normal
  query_shape: conversational
  noise_level: light
  instructions: Sound like a real chat ask with a goal, a little messiness, and more than one clause. It can be informal, slightly rambling, or lightly unpolished, but should still be realistic.
  exemplars:
    - "hi im trying to remember what this film is actually about, not just who made it, can you give me the main idea?"
    - "i keep seeing this term but dont really get what it means or why people care about it, can u explain?"
    - "can you help me place this in context a bit, like what it was and what mattered most about it?"
